<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-10">
        <h1 class="font-bold text-lg"><i class="fa-solid fa-clipboard-check mr-2 text-blue-400"></i>Checklist de Máquinas</h1>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-4" id="container">
        <!-- Itens carregados via JS -->
        <div id="loader" class="text-center py-20 text-slate-500">
            <i class="fa-solid fa-spinner animate-spin text-3xl mb-4"></i>
            <p>Carregando itens da planilha...</p>
        </div>
    </main>

    <script>
        window.onload = () => {
            google.script.run.withSuccessHandler(renderizar).carregarItens();
        };

        function renderizar(data) {
            const container = document.getElementById("container");
            container.innerHTML = "";

            data.forEach((item, index) => {
                const card = document.createElement("div");
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200";
                card.innerHTML = `
                    <div class="mb-3 border-b pb-2">
                        <h3 class="font-bold text-slate-800 text-sm">${item.maquina}</h3>
                        <p class="text-xs text-slate-500">${item.item}</p>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="op-${index}" class="w-full border p-2 rounded-lg text-sm bg-slate-50" placeholder="Nome do Operador">
                        
                        <div class="grid grid-cols-2 gap-2">
                            <select id="st-${index}" class="border p-2 rounded-lg text-sm font-bold bg-slate-50">
                                <option value="OK" class="text-emerald-600">✔️ OK</option>
                                <option value="Problema" class="text-rose-600">⚠️ Problema</option>
                            </select>
                            <button onclick="enviar(${index}, '${item.maquina}', '${item.item}', '${item.setor}', '${item.periodicidade}')" 
                                    class="bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 active:scale-95 transition-all">
                                Registrar
                            </button>
                        </div>
                        <input type="text" id="ob-${index}" class="w-full border p-2 rounded-lg text-sm bg-slate-50" placeholder="Observações (opcional)">
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function enviar(idx, maq, item, set, per) {
            const payload = {
                maquina: maq,
                item: item,
                setor: set,
                periodicidade: per,
                operador: document.getElementById(`op-${idx}`).value,
                status: document.getElementById(`st-${idx}`).value,
                obs: document.getElementById(`ob-${idx}`).value
            };

            if(!payload.operador) return alert("Por favor, preencha o nome do operador.");

            // Desabilita o botão para evitar cliques duplos
            event.target.disabled = true;
            event.target.innerText = "Enviando...";

            google.script.run.withSuccessHandler(() => {
                alert("Registrado com sucesso!");
                location.reload();
            }).registrarChecklist(payload);
        }
    </script>
</body>
</html>
