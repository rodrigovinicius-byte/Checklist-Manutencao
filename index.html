<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Operacional - Controle de Manutenção</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-850 min-h-screen flex flex-col justify-between">

    <header class="bg-slate-900 text-white shadow-md border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-blue-600 rounded-lg text-white">
                    <i class="fa-solid fa-screwdriver-wrench text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Checklist de Manutenção</h1>
                    <p class="text-[11px] text-slate-400">Plataforma Operacional • Sincronizada com Google Sheets</p>
                </div>
            </div>
            <button onclick="toggleConfigModal(true)" class="bg-slate-800 hover:bg-slate-750 border border-slate-700 text-xs font-semibold py-2 px-4 rounded-lg transition-all flex items-center gap-2">
                <i class="fa-solid fa-link text-blue-400"></i> Configurar Conexão Google
            </button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-6 sm:px-6 lg:px-8">
        
        <div id="apiStatusAlert" class="mb-6 p-4 rounded-xl border flex items-center justify-between text-xs bg-amber-50 border-amber-200 text-amber-800">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation text-base"></i>
                <span><strong>Atenção:</strong> Insira a URL do seu Google Apps Script para puxar os itens.</span>
            </div>
            <button onclick="toggleConfigModal(true)" class="underline font-bold hover:text-amber-950">Configurar Agora</button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Setor Responsável</label>
                <select id="setorFilter" onchange="filtrarDados()" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                    <option value="Produção" selected>🏭 Produção</option>
                    <option value="Manutenção">🔧 Manutenção</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Periodicidade</label>
                <select id="periodoFilter" onchange="filtrarDados()" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                    <option value="Intradiária" selected>⏱️ Intradiária</option>
                    <option value="Diária">📅 Diária</option>
                    <option value="Semanal">🗓️ Semanal</option>
                </select>
            </div>
        </div>

        <div id="loadingIndicator" class="hidden text-center py-12">
            <i class="fa-solid fa-circle-notch animate-spin text-3xl text-blue-600"></i>
        </div>

        <div id="checklistContainer" class="space-y-6"></div>

        <div class="mt-8 pt-4 border-t border-slate-200 flex justify-end">
            <button onclick="salvarChecklist()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-8 py-3 rounded-xl shadow-md transition-all flex items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> Registrar na Planilha
            </button>
        </div>
    </main>

    <div id="configModal" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl">
            <h3 class="font-bold text-slate-900 mb-4">Configurar URL da API</h3>
            <input type="text" id="apiInputUrl" class="w-full bg-slate-50 border rounded-lg p-2.5 text-xs mb-4" placeholder="URL do Apps Script">
            <div class="flex justify-end gap-2">
                <button onclick="toggleConfigModal(false)" class="px-4 py-2 text-xs font-semibold text-slate-500">Cancelar</button>
                <button onclick="salvarConfigUrl()" class="px-4 py-2 text-xs font-semibold text-white bg-blue-600 rounded-lg">Salvar</button>
            </div>
        </div>
    </div>

    <div id="notificationModal" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 text-center shadow-2xl">
            <h4 id="notifTitle" class="font-bold text-slate-900 mb-2"></h4>
            <p id="notifMessage" class="text-xs text-slate-500 mb-5"></p>
            <button onclick="closeNotification()" class="w-full py-2 bg-slate-900 text-white text-xs rounded-lg">Entendido</button>
        </div>
    </div>

    <script>
        let originalDatabase = [];
        let API_URL = "";

        window.onload = () => carregarConfiguracoes();

        function carregarConfiguracoes() {
            const savedUrl = localStorage.getItem("checklist_google_api_url");
            if (savedUrl) {
                API_URL = savedUrl;
                baixarDadosDaPlanilha();
            }
        }

        function toggleConfigModal(show) { document.getElementById("configModal").classList.toggle("hidden", !show); }

        function salvarConfigUrl() {
            localStorage.setItem("checklist_google_api_url", document.getElementById("apiInputUrl").value.trim());
            toggleConfigModal(false);
            carregarConfiguracoes();
        }

        async function baixarDadosDaPlanilha() {
            toggleLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=carregarItens`);
                originalDatabase = await res.json();
                filtrarDados();
            } catch (e) { showToast("Erro", "Falha ao conectar à API.", false); }
            finally { toggleLoading(false); }
        }

        function filtrarDados() {
            const set = document.getElementById("setorFilter").value;
            const per = document.getElementById("periodoFilter").value;
            const container = document.getElementById("checklistContainer");
            container.innerHTML = "";

            const filtrados = originalDatabase.filter(x => x.setor === set && x.periodicidade === per);
            const agrupado = {};
            filtrados.forEach(d => {
                if(!agrupado[d.maquina]) agrupado[d.maquina] = [];
                agrupado[d.maquina].push(d);
            });

            for (let maq in agrupado) {
                let card = document.createElement("div");
                card.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden";
                let html = `
                    <div class="bg-slate-800 text-white px-4 py-3 font-semibold text-sm">${maq}</div>
                    <table class="w-full text-left border-collapse text-[11px]">
                        <thead class="bg-slate-50 text-slate-500 uppercase">
                            <tr><th class="p-3">Item</th><th class="p-3 w-32">Operador</th><th class="p-3 w-24">Status</th><th class="p-3">Obs</th></tr>
                        </thead>
                        <tbody>`;
                agrupado[maq].forEach(item => {
                    html += `
                        <tr class="row-check border-t" data-maquina="${maq}" data-item="${item.item}">
                            <td class="p-3 font-medium">${item.item}</td>
                            <td class="p-2"><input type="text" class="op-inp w-full border rounded p-1" placeholder="Nome"></td>
                            <td class="p-2"><select class="status-sel w-full border rounded p-1"><option>OK</option><option>Problema</option></select></td>
                            <td class="p-2"><input type="text" class="obs-inp w-full border rounded p-1"></td>
                        </tr>`;
                });
                html += `</tbody></table>`;
                card.innerHTML = html;
                container.appendChild(card);
            }
        }

        async function salvarChecklist() {
            const payload = Array.from(document.querySelectorAll(".row-check")).map(r => ({
                maquina: r.getAttribute("data-maquina"),
                item: r.getAttribute("data-item"),
                operador: r.querySelector(".op-inp").value,
                status: r.querySelector(".status-sel").value,
                obs: r.querySelector(".obs-inp").value
            }));

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                showToast("Sucesso", "Registrado na planilha!", true);
            } catch(e) { showToast("Erro", "Falha no envio.", false); }
        }

        function toggleLoading(active) { document.getElementById("loadingIndicator").classList.toggle("hidden", !active); }
        function showToast(t, m, s) { 
            document.getElementById("notifTitle").innerText = t;
            document.getElementById("notifMessage").innerText = m;
            document.getElementById("notificationModal").classList.remove("hidden");
        }
        function closeNotification() { document.getElementById("notificationModal").classList.add("hidden"); }
    </script>
</body>
</html>
