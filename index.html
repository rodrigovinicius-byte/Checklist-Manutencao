<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Operacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-slate-900 text-white p-4 shadow-md">
        <h1 class="font-bold text-lg">Checklist de Manutenção</h1>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div id="checklistContainer" class="space-y-4"></div>
    </main>

    <script>
        let originalDatabase = [];
        
        window.onload = async () => {
            google.script.run.withSuccessHandler(res => {
                originalDatabase = res;
                renderizarInterface();
            }).carregarItens();
        };

        function renderizarInterface() {
            const container = document.getElementById("checklistContainer");
            container.innerHTML = "";

            originalDatabase.forEach((item, index) => {
                const card = document.createElement("div");
                card.className = "bg-white p-4 rounded-lg shadow border";
                card.innerHTML = `
                    <div class="mb-3">
                        <h3 class="font-bold text-sm">${item.maquina}</h3>
                        <p class="text-xs text-gray-600">${item.item}</p>
                    </div>
                    <div class="grid grid-cols-1 gap-2">
                        <input type="text" id="op-${index}" class="operador-inp w-full border rounded p-2 text-sm" placeholder="Nome do Operador">
                        <select id="st-${index}" class="status-sel w-full border rounded p-2 text-sm">
                            <option value="OK">✔️ OK</option>
                            <option value="Problema">⚠️ Problema</option>
                        </select>
                        <input type="text" id="ob-${index}" class="obs-inp w-full border rounded p-2 text-sm" placeholder="Observações (opcional)">
                        <button onclick="registrar(${index}, '${item.maquina}', '${item.item}', '${item.setor}', '${item.periodicidade}')" class="bg-blue-600 text-white p-2 rounded text-sm font-bold">Enviar</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function registrar(idx, maq, item, set, per) {
            const data = {
                maquina: maq,
                item: item,
                setor: set,
                periodicidade: per,
                operador: document.getElementById(`op-${idx}`).value,
                status: document.getElementById(`st-${idx}`).value,
                obs: document.getElementById(`ob-${idx}`).value
            };

            if(!data.operador) return alert("Digite o nome do operador!");

            google.script.run.withSuccessHandler(() => {
                alert("Registrado!");
            }).doPost({ postData: { contents: JSON.stringify(data) } });
        }
    </script>
</body>
</html>
