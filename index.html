<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Operacional - Controle de Manutenção</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white shadow-md border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-blue-600 rounded-lg"><i class="fa-solid fa-screwdriver-wrench text-xl"></i></div>
                <div>
                    <h1 class="font-bold">Checklist de Manutenção</h1>
                    <p class="text-[10px] text-slate-400">Sincronizado com Google Sheets</p>
                </div>
            </div>
            <button onclick="toggleConfigModal(true)" class="bg-slate-800 border border-slate-700 text-xs py-2 px-4 rounded-lg hover:bg-slate-700">Configurar Conexão</button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-6">
        <div id="apiStatusAlert" class="mb-6 p-4 rounded-xl border flex items-center justify-between text-xs bg-amber-50 border-amber-200 text-amber-800">
            <span>Atenção: Configure a URL da sua API para começar.</span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Setor</label>
                <select id="setorFilter" onchange="filtrarDados()" class="w-full bg-slate-50 border rounded-lg px-3 py-2 text-sm"></select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Periodicidade</label>
                <select id="periodoFilter" onchange="filtrarDados()" class="w-full bg-slate-50 border rounded-lg px-3 py-2 text-sm"></select>
            </div>
        </div>

        <div id="loadingIndicator" class="hidden text-center py-12"><i class="fa-solid fa-circle-notch animate-spin text-3xl text-blue-600"></i></div>
        <div id="checklistContainer" class="space-y-6"></div>

        <div class="mt-8 pt-4 border-t border-slate-200 flex justify-end">
            <button onclick="salvarChecklist()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-8 py-3 rounded-xl shadow-lg transition-all flex items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> Enviar Checklist
            </button>
        </div>
    </main>

    <div id="configModal" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6">
            <h3 class="font-bold mb-4">Conexão do Google Sheets</h3>
            <input type="text" id="apiInputUrl" class="w-full border rounded-lg p-2.5 mb-4 text-xs" placeholder="Cole a URL do Apps Script aqui">
            <button onclick="salvarConfigUrl()" class="w-full py-2 bg-blue-600 text-white rounded-lg">Salvar Link</button>
        </div>
    </div>

    <script>
        let originalDatabase = [];
        let API_URL = localStorage.getItem("checklist_google_api_url") || "";

        window.onload = () => {
            if (API_URL) baixarDadosDaPlanilha();
            else toggleConfigModal(true);
        };

        async function baixarDadosDaPlanilha() {
            toggleLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=carregarItens`);
                originalDatabase = await res.json();
                
                // Popular filtros dinamicamente
                const setores = [...new Set(originalDatabase.map(i => i.setor))];
                const periodos = [...new Set(originalDatabase.map(i => i.periodicidade))];
                
                document.getElementById('setorFilter').innerHTML = setores.map(s => `<option value="${s}">${s}</option>`).join('');
                document.getElementById('periodoFilter').innerHTML = periodos.map(p => `<option value="${p}">${p}</option>`).join('');
                
                filtrarDados();
            } catch (e) { alert("Erro ao carregar dados."); }
            toggleLoading(false);
        }

        function filtrarDados() {
            const set = document.getElementById("setorFilter").value;
            const per = document.getElementById("periodoFilter").value;
            const container = document.getElementById("checklistContainer");
            container.innerHTML = "";

            const filtrados = originalDatabase.filter(x => x.setor === set && x.periodicidade === per);
            const agrupado = {};
            filtrados.forEach(d => {
                if(!agrupado[d.maquina]) agrupado[d.maquina] = [];
                agrupado[d.maquina].push(d);
            });

            for (let maq in agrupado) {
                let html = `
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden mb-6">
                        <div class="bg-slate-800 text-white px-4 py-3 font-bold flex items-center justify-between">
                            <span>${maq}</span>
                            <button onclick="imprimirFolhaPapel('${maq.replace(/'/g, "\\'")}')" class="bg-slate-700 hover:bg-slate-600 text-white text-[11px] font-medium py-1 px-2.5 rounded transition-all flex items-center gap-1">
                                <i class="fa-solid fa-print"></i> Imprimir p/ Papel
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] uppercase text-slate-500">
                                <tr><th class="p-3">Item / Instrução</th><th class="p-3">Operador</th><th class="p-3">Status</th><th class="p-3">OBS</th></tr>
                            </thead>
                            <tbody>`;
                agrupado[maq].forEach(item => {
                    html += `
                        <tr class="row-check" data-maquina="${maq}" data-item="${item.item}">
                            <td class="p-3 text-xs font-medium">
                                ${item.item}
                                ${item.obs ? `<div class="mt-1 text-[10px] text-blue-700 italic bg-blue-50 p-1 rounded">Obs: ${item.obs}</div>` : ''}
                            </td>
                            <td class="p-3"><input type="text" class="operador-inp w-full border rounded p-1 text-xs" placeholder="Nome"></td>
                            <td class="p-3"><select class="status-sel border rounded p-1 text-xs"><option value="OK">OK</option><option value="Problema">Problema</option></select></td>
                            <td class="p-3"><input type="text" class="obs-inp w-full border rounded p-1 text-xs" placeholder="Descreva o problema..."></td>
                        </tr>`;
                });
                html += `</tbody></table></div></div>`;
                container.innerHTML += html;
            }
        }

        async function salvarChecklist() {
            const rows = document.querySelectorAll(".row-check");
            const payload = Array.from(rows).map(r => ({
                maquina: r.getAttribute("data-maquina"),
                item: r.getAttribute("data-item"),
                setor: document.getElementById("setorFilter").value,
                periodicidade: document.getElementById("periodoFilter").value,
                status: r.querySelector(".status-sel").value,
                operador: r.querySelector(".operador-inp").value,
                obs: r.querySelector(".obs-inp").value
            }));

            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Checklist registrado com sucesso!");
        }

        function toggleLoading(active) { document.getElementById("loadingIndicator").classList.toggle("hidden", !active); }
        function toggleConfigModal(show) { document.getElementById("configModal").classList.toggle("hidden", !show); }
        function salvarConfigUrl() { 
            localStorage.setItem("checklist_google_api_url", document.getElementById("apiInputUrl").value);
            location.reload(); 
        }

        // Função de Impressão de Folha Física Inteligente e Responsiva
        function imprimirFolhaPapel(maquina) {
            const set = document.getElementById("setorFilter").value;
            const per = document.getElementById("periodoFilter").value;
            const filtrados = originalDatabase.filter(x => x.setor === set && x.periodicidade === per && x.maquina === maquina);
            
            const periodoNorm = (per || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
            
            let cabecalhosColunas = [];
            let tituloLinhaDatas = "Datas";

            if (periodoNorm.includes("diari") || periodoNorm.includes("intradi")) {
                tituloLinhaDatas = "Dias da Semana";
                for (let i = 0; i < 7; i++) {
                    let d = new Date();
                    d.setDate(d.getDate() + i);
                    let dataFormatada = d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
                    cabecalhosColunas.push(dataFormatada);
                }
            } else if (periodoNorm.includes("semanal")) {
                tituloLinhaDatas = "Semanas";
                cabecalhosColunas = ["1ª Semana", "2ª Semana", "3ª Semana", "4ª Semana"];
            } else if (periodoNorm.includes("quinzenal")) {
                tituloLinhaDatas = "Quinzenas";
                cabecalhosColunas = ["1ª Quinzena", "2ª Quinzena", "3ª Quinzena", "4ª Quinzena"];
            } else if (periodoNorm.includes("mensal")) {
                tituloLinhaDatas = "Meses";
                cabecalhosColunas = ["1º Mês", "2º Mês", "3º Mês", "4º Mês"];
            } else {
                tituloLinhaDatas = "Controle";
                cabecalhosColunas = ["Col 1", "Col 2", "Col 3", "Col 4", "Col 5"];
            }
            
            let numColunas = cabecalhosColunas.length;
            let printWindow = window.open('', '_blank');
            
            let htmlRows = '';
            filtrados.forEach(item => {
                htmlRows += `
                    <tr>
                        <td colspan="${1 + numColunas}" style="background-color: #0f172a; height: 6px; border: none;"></td>
                    </tr>
                    <tr>
                        <td style="background-color: #f8fafc; font-weight: bold; border: 1px solid #cbd5e1; padding: 6px; text-transform: uppercase; width: 18%;">Item</td>
                        <td colspan="${numColunas}" style="border: 1px solid #cbd5e1; padding: 6px; font-weight: 500;">
                            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 11px;">
                                <span>${item.item}</span>
                                <span style="font-size: 10px; color: #475569; font-weight: bold; background-color: #f1f5f9; padding: 2px 6px; border-radius: 4px;">Setor: ${set}</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color: #f8fafc; font-weight: bold; border: 1px solid #cbd5e1; padding: 6px;">Operador / Manutentor</td>
                        ${Array(numColunas).fill(`<td style="border: 1px solid #cbd5e1; padding: 6px;"></td>`).join('')}
                    </tr>
                    <tr>
                        <td style="background-color: #f8fafc; font-weight: bold; border: 1px solid #cbd5e1; padding: 6px;">Status</td>
                        ${Array(numColunas).fill(`
                            <td style="border: 1px solid #cbd5e1; padding: 5px; font-size: 10px;">
                                <div style="display: flex; align-items: center; justify-content: flex-start; margin-bottom: 4px;">
                                    <div style="width: 11px; height: 11px; border: 1px solid #475569; display: inline-block; margin-right: 5px;"></div>
                                    <span>OK</span>
                                </div>
                                <div style="display: flex; align-items: center; justify-content: flex-start;">
                                    <div style="width: 11px; height: 11px; border: 1px solid #475569; display: inline-block; margin-right: 5px;"></div>
                                    <span>Problema</span>
                                </div>
                            </td>
                        `).join('')}
                    </tr>
                    <tr>
                        <td style="background-color: #f8fafc; font-weight: bold; border: 1px solid #cbd5e1; padding: 6px;">OBS:</td>
                        ${Array(numColunas).fill(`<td style="border: 1px solid #cbd5e1; padding: 6px; height: 22px;"></td>`).join('')}
                    </tr>
                `;
            });

            let headerDatasHtml = cabecalhosColunas.map(cab => `<td class="date-value" style="width: ${82 / numColunas}%; font-size: 11px;">${cab}</td>`).join('');

            printWindow.document.write(`
                <html>
                <head>
                    <title>Checklist Impresso - ${maquina}</title>
                    <style>
                        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 10px; color: #0f172a; }
                        table { width: 100%; border-collapse: collapse; font-size: 11px; }
                        .main-header { background-color: #0f172a; color: white; font-weight: bold; padding: 8px; border: 1px solid #0f172a; text-transform: uppercase; font-size: 10px; }
                        .value-header { background-color: #f1f5f9; color: #0f172a; font-weight: bold; font-size: 13px; text-align: center; border: 1px solid #cbd5e1; padding: 6px; text-transform: uppercase; }
                        .date-header { background-color: #0f172a; color: white; font-weight: bold; border: 1px solid #0f172a; padding: 6px; text-transform: uppercase; font-size: 10px; }
                        .date-value { background-color: white; color: #0f172a; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; padding: 6px; }
                        @media print {
                            body { margin: 0; }
                            tr { page-break-inside: avoid; }
                        }
                    </style>
                </head>
                <body>
                    <table>
                        <tr>
                            <td class="main-header" style="width: 18%;">Maquina/ Equipamento</td>
                            <td colspan="${numColunas}" class="value-header">${maquina}</td>
                        </tr>
                        <tr>
                            <td class="main-header">Periodicidade</td>
                            <td colspan="${numColunas}" class="value-header" style="font-size: 11px;">${per}</td>
                        </tr>
                        <tr>
                            <td class="date-header">${tituloLinhaDatas}</td>
                            ${headerDatasHtml}
                        </tr>
                        ${htmlRows}
                    </table>
                    <script>
                        window.onload = function() {
                            window.print();
                            setTimeout(function() { window.close(); }, 500);
                        };
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }
    </script>
</body>
</html>
