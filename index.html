<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Operacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-slate-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-blue-600 rounded-lg"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                <div>
                    <h1 class="font-bold text-lg">Checklist de Manutenção</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest">Sistema de Registro</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-white p-4 rounded-xl shadow-sm border mb-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Setor</label>
                <select id="setorFilter" onchange="filtrarDados()" class="w-full bg-slate-50 border rounded-lg px-3 py-2 text-sm"></select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Periodicidade</label>
                <select id="periodoFilter" onchange="filtrarDados()" class="w-full bg-slate-50 border rounded-lg px-3 py-2 text-sm"></select>
            </div>
        </div>

        <div id="loadingIndicator" class="hidden text-center py-12">
            <i class="fa-solid fa-circle-notch animate-spin text-3xl text-blue-600"></i>
        </div>
        <div id="checklistContainer" class="space-y-6"></div>
    </main>

    <script>
        let originalDatabase = [];
        
        window.onload = async () => {
            toggleLoading(true);
            try {
                // Chamada via script.run do Apps Script
                google.script.run.withSuccessHandler(res => {
                    originalDatabase = res;
                    const setores = [...new Set(originalDatabase.map(i => i.setor))];
                    const periodos = [...new Set(originalDatabase.map(i => i.periodicidade))];
                    
                    document.getElementById('setorFilter').innerHTML = setores.map(s => `<option value="${s}">${s}</option>`).join('');
                    document.getElementById('periodoFilter').innerHTML = periodos.map(p => `<option value="${p}">${p}</option>`).join('');
                    
                    filtrarDados();
                }).carregarItens();
            } catch (e) { console.error(e); }
            toggleLoading(false);
        };

        function filtrarDados() {
            const set = document.getElementById("setorFilter").value;
            const per = document.getElementById("periodoFilter").value;
            const container = document.getElementById("checklistContainer");
            container.innerHTML = "";

            const filtrados = originalDatabase.filter(x => x.setor === set && x.periodicidade === per);
            const agrupado = {};
            filtrados.forEach(d => {
                if(!agrupado[d.maquina]) agrupado[d.maquina] = [];
                agrupado[d.maquina].push(d);
            });

            for (let maq in agrupado) {
                let html = `<div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <div class="bg-slate-800 text-white px-4 py-3 font-bold text-sm">${maq}</div>
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-50 uppercase text-slate-500">
                            <tr><th class="p-3">Item</th><th class="p-3">Operador</th><th class="p-3">Status</th><th class="p-3">OBS</th><th class="p-3">Ação</th></tr>
                        </thead>
                        <tbody>`;
                agrupado[maq].forEach(item => {
                    html += `<tr class="border-t" data-maquina="${maq}" data-item="${item.item}">
                        <td class="p-3">${item.item} ${item.obs ? `<div class="text-[9px] text-blue-600">Obs: ${item.obs}</div>` : ''}</td>
                        <td class="p-2"><input type="text" class="operador-inp w-full border rounded p-1" placeholder="Nome"></td>
                        <td class="p-2"><select class="status-sel border rounded p-1 w-full"><option value="OK">OK</option><option value="Problema">Problema</option></select></td>
                        <td class="p-2"><input type="text" class="obs-inp w-full border rounded p-1" placeholder="Ocorrências..."></td>
                        <td class="p-2 text-center"><button onclick="registrar(this)" class="bg-blue-600 text-white px-3 py-1 rounded">Enviar</button></td>
                    </tr>`;
                });
                container.innerHTML += html + `</tbody></table></div>`;
            }
        }

        function registrar(btn) {
            const row = btn.closest('tr');
            const data = {
                maquina: row.getAttribute("data-maquina"),
                item: row.getAttribute("data-item"),
                setor: document.getElementById("setorFilter").value,
                periodicidade: document.getElementById("periodoFilter").value,
                operador: row.querySelector(".operador-inp").value,
                status: row.querySelector(".status-sel").value,
                obs: row.querySelector(".obs-inp").value
            };

            if(!data.operador) {
                alert("Preencha o nome do operador!");
                return;
            }

            btn.innerText = "Enviando...";
            google.script.run.withSuccessHandler(() => {
                btn.innerText = "Enviado!";
                btn.className = "bg-green-600 text-white px-3 py-1 rounded";
            }).doPost({ postData: { contents: JSON.stringify(data) } });
        }

        function toggleLoading(active) { document.getElementById("loadingIndicator").classList.toggle("hidden", !active); }
    </script>
</body>
</html>
