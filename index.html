<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Operacional Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <header class="bg-slate-900 text-white shadow-md border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-blue-600 rounded-lg text-white">
                    <i class="fa-solid fa-gears text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Checklist Industrial OS</h1>
                    <p class="text-[11px] text-slate-400">Sincronização Dinâmica com Google Sheets</p>
                </div>
            </div>
            <button onclick="toggleConfigModal(true)" class="bg-slate-800 hover:bg-slate-750 border border-slate-700 text-xs font-semibold py-2 px-4 rounded-lg transition-all">
                <i class="fa-solid fa-link text-blue-400 mr-2"></i> Configurar API
            </button>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto px-4 py-6">
        
        <!-- Filtros Dinâmicos -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Setor Responsável</label>
                <select id="setorFilter" onchange="filtrarDados()" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Periodicidade</label>
                <select id="periodoFilter" onchange="filtrarDados()" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                </select>
            </div>
        </div>

        <div id="loadingIndicator" class="hidden text-center py-12">
            <i class="fa-solid fa-circle-notch animate-spin text-3xl text-blue-600"></i>
        </div>

        <div id="checklistContainer" class="space-y-6"></div>

        <div class="mt-8 pt-4 border-t border-slate-200 flex justify-end">
            <button onclick="salvarChecklist()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-8 py-3 rounded-xl shadow-md transition-all flex items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> Registrar na Planilha
            </button>
        </div>
    </main>

    <script>
        let originalDatabase = [];
        let API_URL = "";

        window.onload = () => {
            const savedUrl = localStorage.getItem("checklist_google_api_url");
            if (savedUrl) {
                API_URL = savedUrl;
                baixarDadosDaPlanilha();
            }
        };

        // Função que lê os dados e preenche os filtros automaticamente (Dinâmico)
        async function baixarDadosDaPlanilha() {
            toggleLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=carregarItens`);
                originalDatabase = await res.json();
                
                // Preencher filtros automaticamente com base nos dados
                popularFiltros();
                filtrarDados();
            } catch (e) { console.error(e); }
            finally { toggleLoading(false); }
        }

        function popularFiltros() {
            const setores = [...new Set(originalDatabase.map(x => x.setor))];
            const periodos = [...new Set(originalDatabase.map(x => x.periodicidade))];
            
            const sFilter = document.getElementById("setorFilter");
            const pFilter = document.getElementById("periodoFilter");
            
            sFilter.innerHTML = setores.map(s => `<option value="${s}">${s}</option>`).join('');
            pFilter.innerHTML = periodos.map(p => `<option value="${p}">${p}</option>`).join('');
        }

        function filtrarDados() {
            const set = document.getElementById("setorFilter").value;
            const per = document.getElementById("periodoFilter").value;
            const container = document.getElementById("checklistContainer");
            container.innerHTML = "";

            const filtrados = originalDatabase.filter(x => x.setor === set && x.periodicidade === per);
            const agrupado = {};
            filtrados.forEach(d => {
                if(!agrupado[d.maquina]) agrupado[d.maquina] = [];
                agrupado[d.maquina].push(d);
            });

            for (let maq in agrupado) {
                let card = document.createElement("div");
                card.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden";
                let html = `
                    <div class="bg-slate-800 text-white px-4 py-3 font-semibold text-sm">${maq}</div>
                    <table class="w-full text-left border-collapse text-xs">
                        <thead class="bg-slate-50 text-slate-500 uppercase border-b">
                            <tr>
                                <th class="p-3 w-[40%]">Item de Verificação</th>
                                <th class="p-3 w-32">Operador</th>
                                <th class="p-3 w-24">Status</th>
                                <th class="p-3">Ocorrência (Caso haja falha)</th>
                            </tr>
                        </thead>
                        <tbody>`;
                
                agrupado[maq].forEach(item => {
                    html += `
                        <tr class="row-check border-t hover:bg-slate-50 transition-colors" data-maquina="${maq}" data-item="${item.item}">
                            <td class="p-3">
                                <div class="font-bold text-slate-800">${item.item}</div>
                                ${item.obs ? `<div class="text-[10px] text-blue-600 font-medium bg-blue-50 p-1 rounded mt-1 italic"><i class="fa-solid fa-info-circle mr-1"></i>Orientação: ${item.obs}</div>` : ''}
                            </td>
                            <td class="p-2"><input type="text" class="op-inp w-full border rounded p-1.5 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Nome"></td>
                            <td class="p-2"><select class="status-sel w-full border rounded p-1.5 font-bold"><option class="text-emerald-600">OK</option><option class="text-rose-600">Problema</option></select></td>
                            <td class="p-2"><input type="text" class="obs-inp w-full border rounded p-1.5 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Descreva o serviço..."></td>
                        </tr>`;
                });
                html += `</tbody></table>`;
                card.innerHTML = html;
                container.appendChild(card);
            }
        }
        
        // ... restante das funções auxiliares ...
    </script>
</body>
</html>
